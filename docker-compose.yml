# ──────────────────────────────────────────────────
# TrueLens AI — Docker Compose
# Full-stack deployment: Backend + Frontend
# ──────────────────────────────────────────────────

version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truelens-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./uploads:/app/uploads
      - ./results:/app/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: truelens-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
